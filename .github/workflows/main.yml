- name: Build Archive
        run: |
          cd ios
          # 1. Clean up any old cached files
          xcodebuild clean -workspace GhostTV.xcworkspace -scheme GhostTV
          
          # 2. Build the app with forced settings
          xcodebuild -workspace GhostTV.xcworkspace \
            -scheme GhostTV \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            BITCODE_GENERATION_MODE=bitcode
          
          # 3. Package into IPA
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r ../GhostTV.ipa Payload
